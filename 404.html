  <script>
const dotSize = 3
const spacing = dotSize * 8
const areaOfEffect = 64
let dots = []
function setup() {
  let cnv = createCanvas(windowWidth, windowHeight);
  cnv.parent('canvas-container');
  for (let i = 0; i < width; i += spacing) {
    for (let j = 0; j < height; j += spacing) {
      dots.push(new Dot(i + spacing/2, j + spacing/2, dotSize))
    }
  }
  noStroke()
}
function draw() {
  background(1, 6, 122);
  dots.forEach(dot => {
    dot.update()
    dot.render()
  })
}
let mouseIsMoving = false;
function mouseMoved() {
  mouseIsMoving = true
  setTimeout(() => mouseIsMoving = false, 100)
}
class Dot {
  constructor(x, y, size) {
    this.x = x;
    this.y = y;
    this.size = size;
    this.transparency = 30
  }
  update() {
    let distance = dist(mouseX, mouseY, this.x, this.y)
    if (mouseIsMoving && distance < areaOfEffect) {
      this.transparency = 200
    } else {
      this.transparency = max(40, this.transparency - 10)
    }
  }
  render() {
    fill(200, this.transparency)
    ellipse(this.x, this.y, this.size)
  }
}
</script>

  <script>
"use strict"; // fix lenis in safari
if (Webflow.env("editor") === undefined) {
  const lenis = new Lenis({
    lerp: 0.1,
    wheelMultiplier: 0.7,
    infinite: false,
    gestureOrientation: "vertical",
    normalizeWheel: false,
    smoothTouch: false
  });
  function raf(time) {
    lenis.raf(time);
    requestAnimationFrame(raf);
  }
  requestAnimationFrame(raf);
  $("[data-lenis-start]").on("click", function () {
    lenis.start();
  });
  $("[data-lenis-stop]").on("click", function () {
    lenis.stop();
  });
  $("[data-lenis-toggle]").on("click", function () {
    $(this).toggleClass("stop-scroll");
    if ($(this).hasClass("stop-scroll")) {
      lenis.stop();
    } else {
      lenis.start();
    }
  });
  function connectToScrollTrigger() {
    lenis.on("scroll", ScrollTrigger.update);
    gsap.ticker.add((time) => {
      lenis.raf(time * 1000);
    });
  }
   // Grab all elements that have a "data-target" attribute
  const scrollButtons = document.querySelectorAll('[data-target]');
  // For each element, listen to a "click" event
  scrollButtons.forEach(button => {
    button.addEventListener('click', e => {
      e.preventDefault();
      // get the DOM element by the ID (data-target value)
      var target = button.dataset.target,
          $el = document.getElementById(target.replace('#', ''));
      // Use lenis.scrollTo() to scroll the page to the right element
      lenis.scrollTo($el, {
        offset: 0, 
        immediate: true,
      });
    });
  });
  // Uncomment this if using GSAP ScrollTrigger
  // connectToScrollTrigger();
}
</script>
